<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area Staff | Omnistock</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="../assets/css/main.css?v=7">
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</head>
<body>
    
    <main class="container animate-fade-in" style="display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 100px);">
        
        <div class="glass-card" style="width: 100%; max-width: 450px; position: relative; overflow: hidden; border-top: 4px solid var(--primary);">
            <div style="position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(to right, var(--primary), var(--primary-light));"></div>
            
            <div style="text-align: center; margin-bottom: 2rem;">
                <div style="background: rgba(37, 99, 235, 0.1); width: 80px; height: 80px; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; border: 1px solid rgba(255,255,255,0.5); box-shadow: inset 0 0 10px rgba(0,0,0,0.05);">
                    <i class="fa-solid fa-fingerprint" style="font-size: 2.5rem; color: var(--primary);"></i>
                </div>
                <h2 style="font-size: 2rem; font-weight: 900;">Area Personale</h2>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 0.5rem;">Accesso riservato alla direzione e ai dipendenti.</p>
            </div>
            
            <div style="margin-bottom: 1.5rem;">
                <input type="password" id="password-staff" class="form-control" placeholder="Password di sistema" style="text-align: center; letter-spacing: 4px; font-family: monospace; font-size: 1.25rem; font-weight: 700;">
            </div>
            
            <button onclick="eseguiLogin()" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 1rem;">Autenticazione</button>
        </div>

    </main>

    <!-- JS Scripts -->
    <script src="../assets/js/firebase-config.js?v=7"></script>
    <script src="../assets/js/common.js?v=7"></script>
    <script src="../assets/js/staff.js?v=7"></script>
</body>
</html>
